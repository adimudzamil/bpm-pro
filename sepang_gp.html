<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏁 Sepang Alphabet Grand Prix</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            font-family: 'Segoe UI', 'Comic Sans MS', 'Chalkboard SE', sans-serif;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #e7f0ed, #c8dfd6);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }
        .game-container {
            max-width: 950px;
            width: 100%;
            background: #fefcf5;
            border-radius: 60px 60px 30px 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
            padding: 25px 25px 30px;
            border: 5px solid #ebd9c4;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .header h1 {
            margin: 0;
            font-size: 1.8rem;
            color: #2d4a3b;
            letter-spacing: 1px;
        }
        .header h1 span { font-size: 2.2rem; }
        .status-badge {
            background: #2d4a3b;
            color: white;
            padding: 8px 20px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: bold;
        }

        /* SPEECH BUBBLE */
        .speech-area {
            background: #e1f0fa;
            border-radius: 100px;
            padding: 12px 25px;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 20px;
            border: 3px solid #b3d0e0;
            min-height: 80px;
            flex-wrap: wrap;
        }
        .target-letter-box {
            background: white;
            border-radius: 60px;
            padding: 0 25px;
            box-shadow: inset 0 3px 8px rgba(0,0,0,0.05);
            min-width: 100px;
            text-align: center;
        }
        .target-letter-box .big-letter {
            font-size: 4.8rem;
            font-weight: 800;
            color: #1b4f6e;
            line-height: 1.2;
        }
        .speech-text {
            flex: 1;
            font-size: 1.5rem;
            font-weight: 500;
            color: #1f3a47;
            min-height: 4rem;
            display: flex;
            align-items: center;
            background: white;
            padding: 8px 25px;
            border-radius: 60px;
            border: 2px dashed #8bb3c9;
        }

        /* SVG TRACK */
        .track-wrapper {
            background: #4caf50;
            border-radius: 40px;
            padding: 15px;
            border: 8px solid #3d8b40;
            margin-bottom: 15px;
            box-shadow: inset 0 0 0 4px #66bb6a;
        }
        .track-svg {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 20px;
            background: #4caf50;
        }

        /* CONTROLS */
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .mic-btn {
            background: #2a9d8f;
            border: none;
            padding: 16px 40px;
            border-radius: 120px;
            font-size: 1.8rem;
            font-weight: bold;
            color: white;
            box-shadow: 0 8px 0 #1a6b61;
            cursor: pointer;
            transition: 0.05s linear;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 3px solid #5fc0b3;
            flex: 2;
            min-width: 200px;
            justify-content: center;
        }
        .mic-btn:active { transform: translateY(6px); box-shadow: 0 2px 0 #1a6b61; }
        .mic-btn.listening {
            background: #e76f51;
            box-shadow: 0 8px 0 #a14f3a;
            animation: pulse 1.2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1); }
        }
        .reset-btn {
            background: #d4c5b0;
            border: none;
            border-radius: 60px;
            font-size: 1.6rem;
            padding: 12px 30px;
            cursor: pointer;
            box-shadow: 0 6px 0 #a6947b;
            transition: 0.05s linear;
            border: 2px solid #eee0cf;
            font-weight: bold;
            color: #4d3e2b;
        }
        .reset-btn:active { transform: translateY(6px); box-shadow: 0 0px 0 #a6947b; }

        /* ALPHABET GRID (Tap to Drive) */
        .grid-label {
            text-align: center;
            font-size: 1.1rem;
            color: #3d5a4a;
            font-weight: bold;
            margin: 10px 0 5px 0;
            letter-spacing: 2px;
        }
        .alphabet-grid {
            display: grid;
            grid-template-columns: repeat(13, 1fr);
            gap: 8px;
            max-width: 700px;
            margin: 0 auto;
        }
        .alphabet-grid button {
            background: #e8f1f5;
            border: 3px solid #b7cdd9;
            border-radius: 60px;
            padding: 12px 0;
            font-size: 1.4rem;
            font-weight: 700;
            color: #1a3a47;
            cursor: pointer;
            transition: 0.1s ease;
            box-shadow: 0 4px 0 #9bb3bf;
            text-align: center;
            line-height: 1;
        }
        .alphabet-grid button:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #9bb3bf;
        }
        .alphabet-grid button.active-letter {
            background: #ffd966;
            border-color: #b87c1a;
            box-shadow: 0 4px 0 #8a5f14;
            color: #4d3509;
            transform: scale(1.02);
        }
        .alphabet-grid button.visited {
            background: #b7e0b7;
            border-color: #3f8740;
        }

        @media (max-width: 600px) {
            .header h1 { font-size: 1.2rem; }
            .target-letter-box .big-letter { font-size: 3.5rem; }
            .speech-text { font-size: 1.0rem; padding: 5px 15px; }
            .alphabet-grid { grid-template-columns: repeat(7, 1fr); }
            .alphabet-grid button { font-size: 1.0rem; padding: 10px 0; }
            .mic-btn { font-size: 1.2rem; padding: 12px 20px; }
        }

        /* Confetti */
        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
            overflow: hidden;
        }
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            top: -20px;
            border-radius: 2px;
            animation: confettiFall linear forwards;
        }
        @keyframes confettiFall {
            to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body>
<div class="game-container">

    <div class="header">
        <h1><span>🏁</span> Sepang GP</h1>
        <div class="status-badge" id="lapBadge">Lap 0</div>
    </div>

    <div class="speech-area">
        <div class="target-letter-box">
            <div class="big-letter" id="currentLetterDisplay">A</div>
        </div>
        <div class="speech-text" id="speechBubble">🎤 Say a letter to drive!</div>
    </div>

    <div class="track-wrapper">
        <svg class="track-svg" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
            <!-- Grass / Background -->
            <rect width="800" height="500" fill="#4CAF50" rx="15"/>
            
            <!-- Track Outer Edge (Kerbs) -->
            <path d="M 200,150 C 200,70 350,40 500,40 C 660,40 760,110 760,220 L 760,350 C 760,430 650,460 550,460 C 450,460 450,410 400,410 C 350,410 350,460 250,460 C 140,460 90,400 110,290 C 120,240 145,190 200,150 Z" 
                  fill="none" stroke="#d32f2f" stroke-width="52" stroke-linecap="round" stroke-linejoin="round"/>
            
            <!-- Track Tarmac -->
            <path id="trackPath" d="M 200,150 C 200,80 350,50 500,50 C 650,50 750,120 750,220 L 750,350 C 750,420 650,450 550,450 C 450,450 450,400 400,400 C 350,400 350,450 250,450 C 150,450 100,400 120,300 C 130,250 150,200 200,150 Z" 
                  fill="none" stroke="#555" stroke-width="44" stroke-linecap="round" stroke-linejoin="round"/>
            
            <!-- Center Line (dashed) -->
            <path d="M 200,150 C 200,80 350,50 500,50 C 650,50 750,120 750,220 L 750,350 C 750,420 650,450 550,450 C 450,450 450,400 400,400 C 350,400 350,450 250,450 C 150,450 100,400 120,300 C 130,250 150,200 200,150 Z" 
                  fill="none" stroke="#fff" stroke-width="3" stroke-dasharray="12 16" opacity="0.7"/>

            <!-- Start/Finish Line -->
            <rect x="180" y="140" width="40" height="8" fill="white" />
            <rect x="180" y="148" width="40" height="8" fill="black" />
            <rect x="180" y="156" width="40" height="8" fill="white" />
            <rect x="180" y="164" width="40" height="8" fill="black" />
            
            <!-- Checkpoints & Letters (injected by JS) -->
            <g id="checkpointsGroup"></g>
            
            <!-- Car -->
            <g id="carGroup" transform="translate(200, 150)">
                <!-- Rear Wing -->
                <rect x="-22" y="-10" width="6" height="20" rx="2" fill="#1D3557"/>
                <!-- Body -->
                <rect x="-18" y="-12" width="36" height="24" rx="8" fill="#E63946" stroke="#1D3557" stroke-width="2"/>
                <!-- Cockpit -->
                <rect x="-4" y="-14" width="8" height="5" rx="3" fill="#1D3557"/>
                <!-- Front Wing -->
                <rect x="16" y="-10" width="6" height="20" rx="2" fill="#1D3557"/>
                <!-- Headlights -->
                <circle cx="16" cy="-7" r="3" fill="#F1FAEE"/>
                <circle cx="16" cy="7" r="3" fill="#F1FAEE"/>
                <!-- Tail lights -->
                <circle cx="-18" cy="-7" r="3" fill="#FFB703"/>
                <circle cx="-18" cy="7" r="3" fill="#FFB703"/>
                <!-- Wheels -->
                <circle cx="-12" cy="-12" r="5" fill="#111"/>
                <circle cx="12" cy="-12" r="5" fill="#111"/>
                <circle cx="-12" cy="12" r="5" fill="#111"/>
                <circle cx="12" cy="12" r="5" fill="#111"/>
            </g>
        </svg>
    </div>

    <div class="controls">
        <button class="mic-btn" id="micBtn">🎙️ Speak</button>
        <button class="reset-btn" id="resetBtn">🔄 New Lap</button>
    </div>

    <div class="grid-label">👆 Tap any letter to drive there (Helper)</div>
    <div class="alphabet-grid" id="alphabetGrid"></div>
</div>

<div class="confetti-container" id="confettiContainer"></div>

<script>
    (function() {
        // ----- CONFIG -----
        const TOTAL_LETTERS = 26;
        const LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');

        // ----- DOM REFS -----
        const trackPath = document.getElementById('trackPath');
        const carGroup = document.getElementById('carGroup');
        const checkpointsGroup = document.getElementById('checkpointsGroup');
        const alphabetGrid = document.getElementById('alphabetGrid');
        const micBtn = document.getElementById('micBtn');
        const resetBtn = document.getElementById('resetBtn');
        const speechBubble = document.getElementById('speechBubble');
        const currentLetterDisplay = document.getElementById('currentLetterDisplay');
        const lapBadge = document.getElementById('lapBadge');
        const confettiContainer = document.getElementById('confettiContainer');

        // ----- STATE -----
        let currentIndex = 0;        // 0 = A
        let currentLength = 0;       // current distance along path
        let targetIndex = 0;
        let targetLength = 0;
        let isAnimating = false;
        let animFrameId = null;
        let lapCount = 0;
        let recognition = null;
        let isListening = false;
        let totalLength = 0;

        // ----- SPEECH MAPPING (Phoneme & Letter Name support) -----
        const letterMap = {
            'A': ['A', 'AY', 'HEY', 'EY', 'AH'],
            'B': ['B', 'BEE', 'BE', 'BI'],
            'C': ['C', 'SEE', 'SEA', 'SI'],
            'D': ['D', 'DEE', 'DE', 'DI'],
            'E': ['E', 'EE', 'I', 'EA'],
            'F': ['F', 'EFF', 'EF'],
            'G': ['G', 'GEE', 'GE', 'GI'],
            'H': ['H', 'AITCH', 'EIGHT', 'HAITCH'],
            'I': ['I', 'EYE', 'AI'],
            'J': ['J', 'JAY', 'JE'],
            'K': ['K', 'KAY', 'KE'],
            'L': ['L', 'ELL', 'EL'],
            'M': ['M', 'EM'],
            'N': ['N', 'EN'],
            'O': ['O', 'OH', 'OW'],
            'P': ['P', 'PEE', 'PE'],
            'Q': ['Q', 'CUE', 'QUE'],
            'R': ['R', 'AR', 'ARE'],
            'S': ['S', 'ESS', 'ES'],
            'T': ['T', 'TEE', 'TE'],
            'U': ['U', 'YOU', 'YU'],
            'V': ['V', 'VEE', 'VE'],
            'W': ['W', 'DOUBLE U', 'DOUBLE YOU'],
            'X': ['X', 'EX', 'EXX'],
            'Y': ['Y', 'WHY'],
            'Z': ['Z', 'ZEE', 'ZED']
        };

        // ----- INIT PATH & CHECKPOINTS -----
        function initTrack() {
            totalLength = trackPath.getTotalLength();
            if (!totalLength || totalLength === 0) {
                // Fallback if SVG not fully loaded
                setTimeout(initTrack, 100);
                return;
            }
            buildCheckpoints();
            updateCarPosition(true);
            buildGrid();
            updateUI();
        }

        function buildCheckpoints() {
            checkpointsGroup.innerHTML = '';
            for (let i = 0; i < TOTAL_LETTERS; i++) {
                const frac = i / TOTAL_LETTERS;
                const p = trackPath.getPointAtLength(frac * totalLength);
                
                // Checkpoint circle
                const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                circle.setAttribute('cx', p.x);
                circle.setAttribute('cy', p.y);
                circle.setAttribute('r', '14');
                circle.setAttribute('fill', '#FFD700');
                circle.setAttribute('stroke', '#333');
                circle.setAttribute('stroke-width', '3');
                circle.setAttribute('data-index', i);
                checkpointsGroup.appendChild(circle);

                // Letter Label (offset outward)
                const p2 = trackPath.getPointAtLength((frac + 0.005) * totalLength % totalLength);
                const angle = Math.atan2(p2.y - p.y, p2.x - p.x);
                const offX = -Math.sin(angle) * 32;
                const offY = Math.cos(angle) * 32;
                
                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', p.x + offX);
                text.setAttribute('y', p.y + offY + 7);
                text.setAttribute('font-size', '18');
                text.setAttribute('font-weight', 'bold');
                text.setAttribute('fill', '#ffffff');
                text.setAttribute('stroke', '#1f3a47');
                text.setAttribute('stroke-width', '1.5');
                text.setAttribute('text-anchor', 'middle');
                text.setAttribute('font-family', 'Arial, sans-serif');
                text.textContent = LETTERS[i];
                checkpointsGroup.appendChild(text);
            }
        }

        // ----- CAR MOVEMENT LOGIC (Always drives FORWARD) -----
        function driveTo(index) {
            if (index < 0 || index >= TOTAL_LETTERS) return;
            if (isAnimating) {
                cancelAnimationFrame(animFrameId);
                isAnimating = false;
            }
            if (index === currentIndex) {
                speechBubble.textContent = `🏁 We're already at ${LETTERS[index]}!`;
                return;
            }

            targetIndex = index;
            const rawTarget = (targetIndex / TOTAL_LETTERS) * totalLength;
            
            // Calculate forward distance
            let diff = rawTarget - currentLength;
            if (diff < 0) diff += totalLength;
            targetLength = currentLength + diff;
            
            isAnimating = true;
            speechBubble.textContent = `🚗 Driving to ${LETTERS[targetIndex]}...`;
            animateCar();
        }

        function animateCar() {
            const diff = targetLength - currentLength;
            if (Math.abs(diff) < 0.8) {
                // Snap to target
                currentLength = targetLength % totalLength;
                if (currentLength < 0) currentLength += totalLength;
                currentIndex = targetIndex;
                isAnimating = false;
                updateCarPosition(false);
                updateUI();
                speechBubble.textContent = `🎉 Arrived at ${LETTERS[currentIndex]}!`;
                // Check if we passed the start line (lap)
                checkLap();
                highlightGrid();
                launchMiniConfetti();
                return;
            }

            // Ease movement
            let step = diff * 0.12;
            if (Math.abs(step) < 0.5) step = diff > 0 ? 0.5 : -0.5;
            currentLength += step;
            
            // Wrap around
            if (currentLength >= totalLength) {
                currentLength -= totalLength;
                lapCount++;
                lapBadge.textContent = `Lap ${lapCount}`;
                if (lapCount > 0 && lapCount % 5 === 0) launchBigConfetti();
            }
            if (currentLength < 0) currentLength += totalLength;

            // Update visual index (approximate)
            const approxIndex = Math.round((currentLength / totalLength) * TOTAL_LETTERS) % TOTAL_LETTERS;
            if (approxIndex !== currentIndex) {
                // only update if significantly changed to avoid flicker
            }
            
            updateCarPosition(false);
            animFrameId = requestAnimationFrame(animateCar);
        }

        function updateCarPosition(snap) {
            const p = trackPath.getPointAtLength(currentLength % totalLength);
            const p2 = trackPath.getPointAtLength((currentLength + 8) % totalLength);
            const angle = Math.atan2(p2.y - p.y, p2.x - p.x) * (180 / Math.PI);
            carGroup.setAttribute('transform', `translate(${p.x}, ${p.y}) rotate(${angle})`);
        }

        function updateUI() {
            currentLetterDisplay.textContent = LETTERS[currentIndex];
            // Update checkpoints visual (highlight current)
            const circles = checkpointsGroup.querySelectorAll('circle');
            circles.forEach((c, i) => {
                c.setAttribute('fill', i === currentIndex ? '#FF5733' : '#FFD700');
                c.setAttribute('stroke', i === currentIndex ? '#FF0000' : '#333');
                c.setAttribute('r', i === currentIndex ? '18' : '14');
            });
            // Update status badge
            const progress = Math.round((currentIndex / TOTAL_LETTERS) * 100);
            lapBadge.textContent = `Lap ${lapCount} · ${progress}%`;
        }

        function highlightGrid() {
            const btns = alphabetGrid.querySelectorAll('button');
            btns.forEach((btn, i) => {
                btn.classList.remove('active-letter');
                if (i === currentIndex) btn.classList.add('active-letter');
            });
        }

        function checkLap() {
            // if we moved from near end to beginning, lap count increment is handled in wrap
        }

        // ----- BUILD ALPHABET GRID (Helper) -----
        function buildGrid() {
            alphabetGrid.innerHTML = '';
            LETTERS.forEach((letter, i) => {
                const btn = document.createElement('button');
                btn.textContent = letter;
                btn.dataset.index = i;
                btn.addEventListener('click', () => driveTo(i));
                alphabetGrid.appendChild(btn);
            });
            highlightGrid();
        }

        // ----- SPEECH RECOGNITION -----
        function initSpeech() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                speechBubble.textContent = '⚠️ Chrome needed for voice. Use Tap buttons!';
                micBtn.disabled = true;
                return null;
            }
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            const rec = new SR();
            rec.lang = 'en-US';
            rec.interimResults = false;
            rec.maxAlternatives = 5;
            rec.continuous = false;

            rec.onstart = () => {
                isListening = true;
                micBtn.textContent = '🔴 Listening...';
                micBtn.classList.add('listening');
                speechBubble.textContent = '🎤 Say a letter (A to Z)!';
            };

            rec.onerror = (event) => {
                isListening = false;
                micBtn.textContent = '🎙️ Speak';
                micBtn.classList.remove('listening');
                if (event.error === 'not-allowed') speechBubble.textContent = '❌ Please allow mic access.';
                else if (event.error === 'no-speech') speechBubble.textContent = '🔇 Didn\'t hear you. Try again!';
                else speechBubble.textContent = `⚠️ Mic error: ${event.error}`;
            };

            rec.onend = () => {
                isListening = false;
                micBtn.textContent = '🎙️ Speak';
                micBtn.classList.remove('listening');
                if (!isAnimating && speechBubble.textContent.includes('Listening')) {
                    speechBubble.textContent = '🎤 Say a letter to drive!';
                }
            };

            rec.onresult = (event) => {
                isListening = false;
                micBtn.textContent = '🎙️ Speak';
                micBtn.classList.remove('listening');

                let spoken = '';
                for (let i = 0; i < event.results.length; i++) {
                    for (let j = 0; j < event.results[i].length; j++) {
                        spoken += event.results[i][j].transcript;
                    }
                }
                spoken = spoken.toUpperCase().trim();
                console.log('Heard:', spoken);

                if (isAnimating) {
                    speechBubble.textContent = `⏳ I'm driving! Wait, then say again.`;
                    return;
                }

                let foundIndex = -1;
                // Try to match
                for (let i = 0; i < LETTERS.length; i++) {
                    const letter = LETTERS[i];
                    const keywords = letterMap[letter] || [letter];
                    for (let kw of keywords) {
                        if (spoken.includes(kw) || kw.includes(spoken)) {
                            // Prefer exact matches (e.g., "B" vs "BEE")
                            if (spoken === kw || spoken === letter) {
                                foundIndex = i;
                                break;
                            }
                            if (foundIndex === -1) foundIndex = i; // fallback
                        }
                    }
                    if (foundIndex !== -1) break;
                }

                // If still not found, try direct character match
                if (foundIndex === -1) {
                    for (let char of spoken) {
                        if (char >= 'A' && char <= 'Z') {
                            foundIndex = char.charCodeAt(0) - 65;
                            break;
                        }
                    }
                }

                if (foundIndex !== -1) {
                    speechBubble.textContent = `🗣️ You said "${spoken}"! Driving to ${LETTERS[foundIndex]}.`;
                    driveTo(foundIndex);
                } else {
                    speechBubble.textContent = `🤔 I heard "${spoken}". Try saying a clear letter like "A" or "B"!`;
                }
            };
            return rec;
        }

        // ----- CONFETTI -----
        function launchMiniConfetti() {
            const container = confettiContainer;
            const colors = ['#f94144', '#f8961e', '#f9c74f', '#90be6d', '#577590', '#9b5de5'];
            for (let i = 0; i < 20; i++) {
                const el = document.createElement('div');
                el.className = 'confetti';
                el.style.left = Math.random() * 100 + '%';
                el.style.background = colors[Math.floor(Math.random() * colors.length)];
                el.style.width = (Math.random() * 8 + 4) + 'px';
                el.style.height = (Math.random() * 8 + 4) + 'px';
                el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                el.style.animationDuration = (Math.random() * 1.5 + 1.5) + 's';
                el.style.animationDelay = (Math.random() * 0.5) + 's';
                container.appendChild(el);
            }
            setTimeout(() => container.innerHTML = '', 3000);
        }

        function launchBigConfetti() {
            const container = confettiContainer;
            const colors = ['#ff0a54', '#ff477e', '#ff7096', '#ff85a1', '#fbb1bd', '#8338ec', '#3a86ff'];
            for (let i = 0; i < 60; i++) {
                const el = document.createElement('div');
                el.className = 'confetti';
                el.style.left = Math.random() * 100 + '%';
                el.style.background = colors[Math.floor(Math.random() * colors.length)];
                el.style.width = (Math.random() * 12 + 6) + 'px';
                el.style.height = (Math.random() * 12 + 6) + 'px';
                el.style.borderRadius = Math.random() > 0.5 ? '50%' : '3px';
                el.style.animationDuration = (Math.random() * 2 + 2) + 's';
                el.style.animationDelay = (Math.random() * 1.5) + 's';
                container.appendChild(el);
            }
            setTimeout(() => container.innerHTML = '', 6000);
        }

        // ----- RESET -----
        function resetGame() {
            if (isAnimating) {
                cancelAnimationFrame(animFrameId);
                isAnimating = false;
            }
            if (isListening && recognition) {
                try { recognition.stop(); } catch(e) {}
                isListening = false;
                micBtn.textContent = '🎙️ Speak';
                micBtn.classList.remove('listening');
            }
            currentIndex = 0;
            currentLength = 0;
            targetIndex = 0;
            targetLength = 0;
            lapCount = 0;
            lapBadge.textContent = 'Lap 0';
            confettiContainer.innerHTML = '';
            updateCarPosition(true);
            updateUI();
            highlightGrid();
            speechBubble.textContent = '🔄 New lap! Say a letter to drive!';
        }

        // ----- EVENT LISTENERS -----
        micBtn.addEventListener('click', () => {
            if (!recognition) {
                recognition = initSpeech();
                if (!recognition) return;
            }
            if (isListening) {
                try { recognition.stop(); } catch(e) {}
                return;
            }
            try { recognition.start(); } catch(e) {
                speechBubble.textContent = '⚠️ Mic busy. Click again.';
            }
        });

        resetBtn.addEventListener('click', resetGame);

        // ----- START -----
        window.onload = function() {
            // Small delay for SVG rendering
            setTimeout(() => {
                initTrack();
                resetGame();
                recognition = initSpeech();
            }, 200);
        };

        // Resize handling: update car on window resize
        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                if (!isAnimating) updateCarPosition(true);
            }, 200);
        });

    })();
</script>
</body>
</html>
