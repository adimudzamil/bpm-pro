<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🏎️ Letter Raceway!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@800;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Fredoka One',cursive}
  #c{display:block;width:100%;height:100%}

  /* ── HUD overlay ── */
  #hud{position:fixed;inset:0;pointer-events:none;z-index:10}

  /* top center – SAY THIS letter */
  #sayBox{
    position:absolute;top:18px;left:50%;transform:translateX(-50%);
    background:rgba(10,5,30,.85);border:3px solid rgba(255,255,255,.15);
    border-radius:22px;padding:10px 32px;display:flex;align-items:center;gap:14px;
    box-shadow:0 8px 32px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.1);
    backdrop-filter:blur(12px);
  }
  #sayLabel{font-size:15px;color:rgba(255,255,255,.5);letter-spacing:2px;text-transform:uppercase}
  #bigLetter{
    font-size:64px;line-height:1;color:#fff;
    text-shadow:0 0 24px #ff4757,0 0 60px #ff4757aa;
    transition:transform .1s;
  }
  #bigLetter.pop{animation:pop .25s ease}
  @keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.45) rotate(-5deg)}100%{transform:scale(1)}}

  /* progress bar */
  #progressWrap{
    position:absolute;top:108px;left:50%;transform:translateX(-50%);
    width:340px;
  }
  #progressTrack{
    height:10px;background:rgba(255,255,255,.1);border-radius:10px;overflow:hidden;
    border:1px solid rgba(255,255,255,.12);
  }
  #progressFill{height:100%;background:linear-gradient(90deg,#7bed9f,#2ed573);border-radius:10px;transition:width .6s cubic-bezier(.34,1.56,.64,1)}
  #progressLabel{text-align:center;margin-top:5px;font-size:13px;color:rgba(255,255,255,.4);font-family:'Nunito',sans-serif;font-weight:800}

  /* alphabet pills */
  #pills{
    position:absolute;bottom:158px;left:50%;transform:translateX(-50%);
    display:flex;flex-wrap:wrap;justify-content:center;gap:3px;max-width:390px;
  }
  .pill{
    width:24px;height:24px;border-radius:7px;font-size:11px;display:flex;align-items:center;justify-content:center;
    background:rgba(255,255,255,.07);color:rgba(255,255,255,.25);transition:all .3s;
  }
  .pill.done{background:rgba(46,213,115,.35);color:#2ed573;box-shadow:0 0 8px rgba(46,213,115,.4)}
  .pill.active{background:#ff4757;color:#fff;transform:scale(1.3);box-shadow:0 0 14px rgba(255,71,87,.8)}

  /* mic button */
  #micWrap{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:all}
  #micBtn{
    width:82px;height:82px;border-radius:50%;border:none;cursor:pointer;font-size:34px;
    background:linear-gradient(145deg,#ff6b81,#ff4757);
    box-shadow:0 6px 0 #a71d2a,0 10px 30px rgba(255,71,87,.5);
    transition:transform .1s,box-shadow .1s;display:flex;align-items:center;justify-content:center;
  }
  #micBtn:active,#micBtn.on{transform:translateY(4px);box-shadow:0 2px 0 #a71d2a,0 4px 14px rgba(255,71,87,.4);background:linear-gradient(145deg,#c0392b,#922b21)}
  #micBtn.on{animation:micPulse 1s infinite}
  @keyframes micPulse{0%,100%{box-shadow:0 2px 0 #a71d2a,0 0 0 0 rgba(255,71,87,.7)}50%{box-shadow:0 2px 0 #a71d2a,0 0 0 22px rgba(255,71,87,0)}}
  #micHint{font-size:13px;color:rgba(255,255,255,.45);font-family:'Nunito',sans-serif;font-weight:800;letter-spacing:.5px}

  /* heard bubble */
  #heardBubble{
    position:absolute;bottom:122px;left:50%;transform:translateX(-50%);
    background:rgba(255,255,255,.95);border-radius:14px;padding:7px 18px;
    font-family:'Nunito',sans-serif;font-weight:800;font-size:20px;color:#222;
    opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;
    box-shadow:0 4px 20px rgba(0,0,0,.4);
  }
  #heardBubble.show{opacity:1}

  /* toast status */
  #toast{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    font-size:40px;color:#fff;text-shadow:3px 3px 0 rgba(0,0,0,.5);
    pointer-events:none;opacity:0;text-align:center;line-height:1.3;
    transition:opacity .25s;
  }
  #toast.show{opacity:1}

  /* confetti canvas */
  #confettiCanvas{position:fixed;inset:0;pointer-events:none;z-index:20}

  /* win screen */
  #win{
    display:none;position:fixed;inset:0;z-index:30;
    background:rgba(5,2,20,.92);backdrop-filter:blur(8px);
    flex-direction:column;align-items:center;justify-content:center;gap:20px;
  }
  #win.show{display:flex}
  #winTitle{font-size:80px;color:#ffd32a;text-shadow:4px 4px 0 #b7950b,0 0 60px rgba(255,211,42,.4);animation:winpop .5s ease}
  @keyframes winpop{0%{transform:scale(0) rotate(-15deg)}80%{transform:scale(1.08) rotate(2deg)}100%{transform:scale(1)}}
  #winSub{font-size:26px;color:rgba(255,255,255,.8);text-align:center;font-family:'Nunito',sans-serif;font-weight:800}
  #replayBtn{
    font-family:'Fredoka One',cursive;font-size:26px;color:#fff;border:none;cursor:pointer;
    background:linear-gradient(145deg,#2ed573,#1abc9c);border-radius:20px;
    padding:14px 44px;box-shadow:0 6px 0 #0e7a63;transition:transform .1s;
  }
  #replayBtn:active{transform:translateY(4px);box-shadow:0 2px 0 #0e7a63}

  /* start screen */
  #startScreen{
    position:fixed;inset:0;z-index:25;
    background:linear-gradient(145deg,#0d0221,#1a0535,#0a1628);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;
  }
  #startScreen.hide{display:none}
  #startTitle{font-size:70px;color:#fff;text-shadow:0 0 40px #ff4757,4px 4px 0 #7f0000;text-align:center}
  #startSub{font-size:20px;color:rgba(255,255,255,.6);font-family:'Nunito',sans-serif;font-weight:800;text-align:center;max-width:320px}
  #startBtn{
    font-family:'Fredoka One',cursive;font-size:28px;color:#fff;border:none;cursor:pointer;
    background:linear-gradient(145deg,#ff6b81,#ff4757);border-radius:22px;
    padding:16px 52px;box-shadow:0 6px 0 #a71d2a,0 0 40px rgba(255,71,87,.4);
    transition:transform .1s;pointer-events:all;
  }
  #startBtn:active{transform:translateY(4px);box-shadow:0 2px 0 #a71d2a}
  #keyHint{font-size:13px;color:rgba(255,255,255,.3);font-family:'Nunito',sans-serif;font-weight:800;cursor:pointer;pointer-events:all}

  /* no-speech warning */
  #noSpeechWarn{
    display:none;position:fixed;bottom:180px;left:50%;transform:translateX(-50%);
    background:#e74c3c;color:#fff;padding:10px 20px;border-radius:12px;
    font-size:13px;font-family:'Nunito',sans-serif;font-weight:800;text-align:center;
    max-width:290px;z-index:50;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<canvas id="confettiCanvas"></canvas>

<!-- START SCREEN -->
<div id="startScreen">
  <div id="startTitle">🏎️<br>Letter<br>Raceway!</div>
  <div id="startSub">Say your ABCs to race around the track!<br>Hold the mic and speak each letter.</div>
  <button id="startBtn">🚦 Start Racing!</button>
  <div id="keyHint">⌨️ Enable keyboard mode (testing)</div>
</div>

<!-- GAME HUD -->
<div id="hud">
  <div id="sayBox">
    <span id="sayLabel">SAY</span>
    <span id="bigLetter">A</span>
  </div>
  <div id="progressWrap">
    <div id="progressTrack"><div id="progressFill" style="width:0%"></div></div>
    <div id="progressLabel">0 / 26 letters</div>
  </div>
  <div id="pills"></div>
  <div id="heardBubble"></div>
  <div id="toast"></div>
  <div id="micWrap">
    <button id="micBtn" title="Hold to speak">🎤</button>
    <div id="micHint">Hold to Speak!</div>
  </div>
</div>

<div id="noSpeechWarn">Speech recognition unavailable.<br>Try Chrome on Android or desktop!</div>

<!-- WIN SCREEN -->
<div id="win">
  <div id="winTitle">🏆 CHAMPION!</div>
  <div id="winSub">You said all 26 letters!<br>Amazing racing! 🎉🎊</div>
  <button id="replayBtn" onclick="resetGame()">🔁 Race Again!</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

// ═══════════════════════════════════════════════════════
//  THREE.JS SCENE SETUP
// ═══════════════════════════════════════════════════════
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setClearColor(0x0a0118);

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x0a0118, 80, 260);

const camera = new THREE.PerspectiveCamera(55, 1, 0.1, 500);
// Top-down-ish chase cam, tilted 60° looking down-forward
camera.position.set(0, 28, 22);
camera.lookAt(0, 0, 0);

function onResize() {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
}
onResize();
window.addEventListener('resize', onResize);

// ── Lighting ──
const ambient = new THREE.AmbientLight(0x9090cc, 0.6);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xfff0dd, 1.4);
sun.position.set(40, 80, 30);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 0.5;
sun.shadow.camera.far = 300;
sun.shadow.camera.left = sun.shadow.camera.bottom = -120;
sun.shadow.camera.right = sun.shadow.camera.top = 120;
scene.add(sun);

// Coloured rim lights for atmosphere
const fillBlue = new THREE.PointLight(0x3050ff, 1.2, 100);
fillBlue.position.set(-50, 30, -50);
scene.add(fillBlue);
const fillPink = new THREE.PointLight(0xff2060, 0.8, 80);
fillPink.position.set(50, 20, 50);
scene.add(fillPink);

// ── Ground plane ──
const groundGeo = new THREE.PlaneGeometry(400, 400);
const groundMat = new THREE.MeshLambertMaterial({ color: 0x0c2210 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Decorative grass dots
for (let i = 0; i < 200; i++) {
  const g = new THREE.Mesh(
    new THREE.CircleGeometry(0.6 + Math.random() * 1.2, 8),
    new THREE.MeshLambertMaterial({ color: new THREE.Color().setHSL(0.3 + Math.random()*0.05, 0.6, 0.08 + Math.random()*0.06) })
  );
  g.rotation.x = -Math.PI / 2;
  g.position.set((Math.random()-0.5)*300, 0.01, (Math.random()-0.5)*300);
  scene.add(g);
}

// ── Stars (background) ──
{
  const starGeo = new THREE.BufferGeometry();
  const sv = [];
  for (let i = 0; i < 800; i++) {
    sv.push((Math.random()-0.5)*500, 60 + Math.random()*150, (Math.random()-0.5)*500);
  }
  starGeo.setAttribute('position', new THREE.Float32BufferAttribute(sv, 3));
  scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.5 })));
}

// ═══════════════════════════════════════════════════════
//  TRACK PATH  (Sepang-inspired — in XZ plane, Y=0)
// ═══════════════════════════════════════════════════════
const RAW = [
  [55,-38],[40,-38],[20,-38],[0,-38],[-20,-38],
  [-42,-32],[-52,-18],[-52,0],[-48,16],
  [-38,28],[-22,36],[-4,39],
  [12,33],[18,22],[14,10],[5,2],
  [-8,-8],[-10,-20],[-4,-28],
  [10,-34],
  [30,-30],[48,-18],[54,0],[52,18],
  [48,28],[42,36],[55,38],[55,-38],
];

const trackPts = RAW.map(([x,z])=> new THREE.Vector3(x, 0, z));
const trackCurve = new THREE.CatmullRomCurve3(trackPts, true, 'catmullrom', 0.5);
const TRACK_SEGS = 300;
const trackPoints3D = trackCurve.getPoints(TRACK_SEGS);

// ── Build track mesh ──
const TRACK_W = 10;
function buildTrackMesh() {
  const positions = [], uvs = [], indices = [], normals = [];
  for (let i = 0; i <= TRACK_SEGS; i++) {
    const t = i / TRACK_SEGS;
    const pt = trackCurve.getPoint(t);
    const tan = trackCurve.getTangent(t).normalize();
    const right = new THREE.Vector3().crossVectors(tan, new THREE.Vector3(0,1,0)).normalize();

    const L = pt.clone().addScaledVector(right, -TRACK_W);
    const R = pt.clone().addScaledVector(right, TRACK_W);
    positions.push(L.x,0.01,L.z, R.x,0.01,R.z);
    normals.push(0,1,0, 0,1,0);
    uvs.push(0,t*20, 1,t*20);

    if (i < TRACK_SEGS) {
      const b = i * 2;
      indices.push(b,b+2,b+1, b+1,b+2,b+3);
    }
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions,3));
  geo.setAttribute('normal',   new THREE.Float32BufferAttribute(normals,3));
  geo.setAttribute('uv',       new THREE.Float32BufferAttribute(uvs,2));
  geo.setIndex(indices);

  // Asphalt texture via canvas
  const tc = document.createElement('canvas'); tc.width = tc.height = 256;
  const tx = tc.getContext('2d');
  tx.fillStyle = '#2a2a2a';
  tx.fillRect(0,0,256,256);
  // noise
  for (let j=0;j<3000;j++){
    tx.fillStyle=`rgba(${40+Math.random()*20},${40+Math.random()*20},${40+Math.random()*20},0.5)`;
    tx.fillRect(Math.random()*256,Math.random()*256,2,2);
  }
  // center dashes
  tx.setLineDash([20,20]);
  tx.strokeStyle='rgba(255,255,255,0.15)'; tx.lineWidth=3;
  tx.beginPath(); tx.moveTo(128,0); tx.lineTo(128,256); tx.stroke();
  const tex = new THREE.CanvasTexture(tc);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(1,4);

  const mat = new THREE.MeshLambertMaterial({ map:tex, color:0x888888 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.receiveShadow = true;
  scene.add(mesh);

  // Kerbs (red/white striped border)
  [1,-1].forEach(side => {
    const kpos=[], kidx=[];
    for (let i=0;i<=TRACK_SEGS;i++){
      const t=i/TRACK_SEGS;
      const pt=trackCurve.getPoint(t);
      const tan=trackCurve.getTangent(t).normalize();
      const right=new THREE.Vector3().crossVectors(tan,new THREE.Vector3(0,1,0)).normalize();
      const edge=pt.clone().addScaledVector(right,side*TRACK_W);
      const outer=pt.clone().addScaledVector(right,side*(TRACK_W+1.8));
      kpos.push(edge.x,0.015,edge.z, outer.x,0.015,outer.z);
      if(i<TRACK_SEGS){const b=i*2;kidx.push(b,b+2,b+1,b+1,b+2,b+3);}
    }
    const kg=new THREE.BufferGeometry();
    kg.setAttribute('position',new THREE.Float32BufferAttribute(kpos,3));
    kg.setIndex(kidx);
    // striped kerb texture
    const kc=document.createElement('canvas');kc.width=4;kc.height=64;
    const kx=kc.getContext('2d');
    for(let s=0;s<8;s++){kx.fillStyle=s%2===0?'#cc0000':'#ffffff';kx.fillRect(0,s*8,4,8);}
    const ktex=new THREE.CanvasTexture(kc);
    ktex.wrapS=ktex.wrapT=THREE.RepeatWrapping;ktex.repeat.set(1,16);
    const km=new THREE.MeshLambertMaterial({map:ktex});
    const kerb=new THREE.Mesh(kg,km);kerb.receiveShadow=true;scene.add(kerb);
  });
}
buildTrackMesh();

// Start/finish line
{
  const sfGeo = new THREE.PlaneGeometry(TRACK_W*2, 4);
  const sc = document.createElement('canvas'); sc.width=128; sc.height=32;
  const sx = sc.getContext('2d');
  for(let c=0;c<8;c++)for(let r=0;r<2;r++){
    sx.fillStyle=(c+r)%2===0?'#ffffff':'#000000';
    sx.fillRect(c*16,r*16,16,16);
  }
  const stex = new THREE.CanvasTexture(sc);
  const sfMesh = new THREE.Mesh(sfGeo, new THREE.MeshLambertMaterial({map:stex}));
  const startPt = trackCurve.getPoint(0);
  const startTan = trackCurve.getTangent(0);
  sfMesh.rotation.x = -Math.PI/2;
  sfMesh.position.set(startPt.x, 0.02, startPt.z);
  const ang = Math.atan2(startTan.x, startTan.z);
  sfMesh.rotation.z = ang;
  scene.add(sfMesh);
}

// Barrier walls
{
  function addBarrier(side){
    const bpos=[];
    for(let i=0;i<=TRACK_SEGS;i++){
      const t=i/TRACK_SEGS;
      const pt=trackCurve.getPoint(t);
      const tan=trackCurve.getTangent(t).normalize();
      const right=new THREE.Vector3().crossVectors(tan,new THREE.Vector3(0,1,0)).normalize();
      const p=pt.clone().addScaledVector(right,side*(TRACK_W+2.5));
      bpos.push(new THREE.Vector3(p.x,0,p.z));
    }
    const curve=new THREE.CatmullRomCurve3(bpos,true);
    const pts=curve.getPoints(TRACK_SEGS);
    const barGeo=new THREE.BufferGeometry().setFromPoints(pts);
    // Use tube along path
    const tubeCurve=new THREE.CatmullRomCurve3(bpos,true);
    const tube=new THREE.TubeGeometry(tubeCurve,TRACK_SEGS,0.25,6,true);
    const barMat=new THREE.MeshLambertMaterial({color:side>0?0xff3333:0xccccff});
    const bar=new THREE.Mesh(tube,barMat);
    bar.castShadow=true;
    scene.add(bar);
  }
  addBarrier(1); addBarrier(-1);
}

// ═══════════════════════════════════════════════════════
//  CHECKPOINT OBJECTS
// ═══════════════════════════════════════════════════════
const LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
const TOTAL_CP = 28; // 0=START, 1-26=A-Z, 27=FINISH

function makeLetterTexture(label, color='#ff4757', bg='rgba(10,5,30,0.95)') {
  const s = 128;
  const c = document.createElement('canvas'); c.width=c.height=s;
  const x = c.getContext('2d');
  // background circle
  x.fillStyle = bg;
  x.beginPath(); x.arc(s/2,s/2,s/2-2,0,Math.PI*2); x.fill();
  // ring
  x.strokeStyle = color; x.lineWidth = 6;
  x.beginPath(); x.arc(s/2,s/2,s/2-5,0,Math.PI*2); x.stroke();
  // letter
  x.fillStyle = color;
  x.font = `bold ${label.length>1?38:52}px 'Fredoka One',cursive`;
  x.textAlign='center'; x.textBaseline='middle';
  x.shadowColor=color; x.shadowBlur=20;
  x.fillText(label, s/2, s/2);
  return new THREE.CanvasTexture(c);
}

const cpMeshes = [];
const cpPositions = [];

for (let i = 0; i < TOTAL_CP; i++) {
  const t = i / TOTAL_CP;
  const pt = trackCurve.getPoint(t);
  cpPositions.push(pt.clone());

  let label, color;
  if (i===0) { label='GO!'; color='#2ed573'; }
  else if (i===TOTAL_CP-1) { label='🏁'; color='#ffd32a'; }
  else { label=LETTERS[i-1]; color='#ff4757'; }

  const tex = makeLetterTexture(i===TOTAL_CP-1?'FIN':label, color);
  const panelGeo = new THREE.PlaneGeometry(4,4);
  const panel = new THREE.Mesh(panelGeo, new THREE.MeshBasicMaterial({map:tex,transparent:true,side:THREE.DoubleSide}));
  panel.position.set(pt.x, 5, pt.z);
  // face camera (billboard — updated in loop)
  scene.add(panel);
  cpMeshes.push(panel);

  // Post
  const post = new THREE.Mesh(
    new THREE.CylinderGeometry(0.12,0.12,5,8),
    new THREE.MeshLambertMaterial({color:0x888888})
  );
  post.position.set(pt.x, 2.5, pt.z);
  scene.add(post);
}

function updateCheckpointVisuals(currentIdx) {
  cpMeshes.forEach((m,i) => {
    let color;
    if (i===0) color='#2ed573';
    else if (i===TOTAL_CP-1) color='#ffd32a';
    else {
      const done=(i-1)<(currentIdx-1);
      const active=(i-1)===(currentIdx-1);
      color = done?'#2ed573': active?'#ff4757':'#445';
    }
    const label = i===0?'GO!': i===TOTAL_CP-1?'FIN': LETTERS[i-1];
    m.material.map = makeLetterTexture(label, color);
    m.material.map.needsUpdate = true;
    // scale active
    const sc = (i === currentIdx) ? 1.3 : 1.0;
    m.scale.setScalar(sc);
  });
}

// ═══════════════════════════════════════════════════════
//  KART MODEL
// ═══════════════════════════════════════════════════════
const kartGroup = new THREE.Group();
scene.add(kartGroup);

function buildKart() {
  const g = kartGroup;
  while(g.children.length) g.remove(g.children[0]);

  // Body
  const bodyGeo = new THREE.BoxGeometry(2.6, 0.7, 4);
  const bodyMat = new THREE.MeshLambertMaterial({color:0xff3355});
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 0.55; body.castShadow=true;
  g.add(body);

  // Cockpit
  const cockGeo = new THREE.BoxGeometry(1.4, 0.6, 1.8);
  const cockMat = new THREE.MeshLambertMaterial({color:0x1a2540});
  const cock = new THREE.Mesh(cockGeo, cockMat);
  cock.position.set(0, 1.05, -0.2); cock.castShadow=true;
  g.add(cock);

  // Windshield
  const wsGeo = new THREE.PlaneGeometry(1.2, 0.5);
  const wsMat = new THREE.MeshLambertMaterial({color:0x88ccff,transparent:true,opacity:0.6,side:THREE.DoubleSide});
  const ws = new THREE.Mesh(wsGeo, wsMat);

const exhaustParticles = [];
const exhaustGeo = new THREE.SphereGeometry(0.18,6,6);
const exhaustMats = [
  new THREE.MeshBasicMaterial({color:0xbbbbbb,transparent:true}),
  new THREE.MeshBasicMaterial({color:0x888888,transparent:true}),
];
function spawnExhaust(pos, vel) {
  if (exhaustParticles.length > 40) return;
  const m = new THREE.Mesh(exhaustGeo, exhaustMats[Math.floor(Math.random()*2)].clone());
  m.position.copy(pos);
  m.userData = { vel: vel.clone().multiplyScalar(0.3 + Math.random()*0.4), life:1.0, vY:0.02+Math.random()*0.04 };
  scene.add(m);
  exhaustParticles.push(m);
}
function updateExhaust(dt) {
  for (let i=exhaustParticles.length-1;i>=0;i--) {
    const p=exhaustParticles[i];
    p.userData.life -= dt*2.5;
    p.position.addScaledVector(p.userData.vel, dt*30);
    p.position.y += p.userData.vY;
    p.material.opacity = p.userData.life * 0.5;
    const s=0.5+p.userData.life*1.0;
    p.scale.setScalar(s);
    if(p.userData.life<=0){scene.remove(p);exhaustParticles.splice(i,1);}
  }
}

//  EXPLOSION PARTICLES
// ═══════════════════════════════════════════════════════
const explosionParts = [];
const explColors=[0xff4400,0xffcc00,0xff0066,0x00ffcc,0xffff00];
function triggerExplosion(pos){
  for(let i=0;i<30;i++){
    const m=new THREE.Mesh(
      new THREE.SphereGeometry(0.15+Math.random()*0.25,6,6),
      new THREE.MeshBasicMaterial({color:explColors[i%explColors.length],transparent:true})
    );
    m.position.copy(pos).addScalar(Math.random()*0.5-0.25);
    m.position.y+=0.5;
    const ang=Math.random()*Math.PI*2, elvAng=Math.random()*Math.PI/2;
    const speed=5+Math.random()*12;
    m.userData={
      vx:Math.cos(ang)*Math.cos(elvAng)*speed,
      vy:Math.sin(elvAng)*speed+4,
      vz:Math.sin(ang)*Math.cos(elvAng)*speed,
      life:1.0, rot:Math.random()*10
    };
    scene.add(m);
    explosionParts.push(m);
  }
  // Flash point light
  const flash=new THREE.PointLight(0xff8800,15,20);
  flash.position.copy(pos); flash.position.y+=1;
  scene.add(flash);
  setTimeout(()=>scene.remove(flash),200);
}
function updateExplosion(dt){
  for(let i=explosionParts.length-1;i>=0;i--){
    const p=explosionParts[i];
    p.userData.life-=dt*1.8;
    p.position.x+=p.userData.vx*dt;
    p.position.y+=p.userData.vy*dt;
    p.position.z+=p.userData.vz*dt;
    p.userData.vy-=18*dt;
    p.material.opacity=p.userData.life;
    p.rotation.x+=p.userData.rot*dt;
    p.rotation.z+=p.userData.rot*0.7*dt;
    if(p.userData.life<=0){scene.remove(p);explosionParts.splice(i,1);}
  }
}

//  GAME STATE
// ═══════════════════════════════════════════════════════
let currentIndex = 0;
let kartT = 0;
let kartTargetT = 0;
let kartMoving = false;
let gameStarted = false;
let gameWon = false;

// crash state
let crashing = false;
let crashTimer = 0;
let donutAngle = 0;
let donutCenter = new THREE.Vector3();
let postCrashWait = false;

// smooth kart
let kartVelMag = 0;
let kartWobble = 0;

// cam
let camT = 0; // trail the kart

function cpT(idx) { return (idx % TOTAL_CP) / TOTAL_CP; }

function kartWorldPos(t) { return trackCurve.getPoint(t); }
function kartTangent(t) { return trackCurve.getTangent(t).normalize(); }

// init kart position
function initKartPos() {
  const pt = kartWorldPos(0);
  kartGroup.position.copy(pt);
  kartGroup.position.y = 0;
  const tan = kartTangent(0);
  kartGroup.rotation.y = Math.atan2(tan.x, tan.z);
}
initKartPos();

//  UI HELPERS
// ═══════════════════════════════════════════════════════
function buildPills() {
  const wrap=document.getElementById('pills');
  wrap.innerHTML='';
  LETTERS.forEach(l=>{
    const d=document.createElement('div');
    d.className='pill'; d.id='pill-'+l; d.textContent=l;
    wrap.appendChild(d);
  });
}
function updatePills() {
  LETTERS.forEach((l,i)=>{
    const p=document.getElementById('pill-'+l);
    if(!p)return;
    p.className='pill';
    if(i<currentIndex-1) p.classList.add('done');
    else if(i===currentIndex-1) p.classList.add('active');
  });
}
function updateHUD() {
  const el=document.getElementById('bigLetter');
  const fill=document.getElementById('progressFill');
  const label=document.getElementById('progressLabel');

  if(currentIndex===0){el.textContent='A';}
  else if(currentIndex<=25){el.textContent=LETTERS[currentIndex];}
  else if(currentIndex===26){el.textContent='🏁';}
  else{el.textContent='🏁';}

  const pct=Math.min(currentIndex/27*100,100);
  fill.style.width=pct+'%';
  label.textContent=Math.min(currentIndex,26)+' / 26 letters';

  el.classList.remove('pop');
  void el.offsetWidth;
  el.classList.add('pop');

  updatePills();
  updateCheckpointVisuals(currentIndex);
}

let toastTimer=null;
function showToast(msg,ms=1400){
  const t=document.getElementById('toast');
  t.innerHTML=msg; t.classList.add('show');
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),ms);
}

function showHeard(text){
  const b=document.getElementById('heardBubble');
  b.textContent='"'+text+'"'; b.classList.add('show');
  setTimeout(()=>b.classList.remove('show'),1200);
}

// ─── Confetti ───────────────────────────────────────────
const confCanvas=document.getElementById('confettiCanvas');
confCanvas.width=window.innerWidth; confCanvas.height=window.innerHeight;
window.addEventListener('resize',()=>{confCanvas.width=window.innerWidth;confCanvas.height=window.innerHeight;});
const confCtx=confCanvas.getContext('2d');
let confetti=[];
function spawnConfetti(n=60){
  for(let i=0;i<n;i++){
    confetti.push({
      x:Math.random()*confCanvas.width, y:-10,
      vx:(Math.random()-0.5)*4, vy:2+Math.random()*4,
      size:6+Math.random()*8, rot:Math.random()*360, rotV:(Math.random()-0.5)*8,
      color:`hsl(${Math.random()*360},90%,65%)`, life:1.0
    });
  }
}
function updateConfetti(dt){
  confCtx.clearRect(0,0,confCanvas.width,confCanvas.height);
  for(let i=confetti.length-1;i>=0;i--){
    const p=confetti[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.1; p.rot+=p.rotV; p.life-=dt*0.4;
    confCtx.save();
    confCtx.globalAlpha=Math.max(0,p.life);
    confCtx.translate(p.x,p.y); confCtx.rotate(p.rot*Math.PI/180);
    confCtx.fillStyle=p.color;
    confCtx.fillRect(-p.size/2,-p.size/4,p.size,p.size/2);
    confCtx.restore();
    if(p.life<=0||p.y>confCanvas.height+20) confetti.splice(i,1);
  }
}

// ═══════════════════════════════════════════════════════
//  GAME LOGIC
// ═══════════════════════════════════════════════════════
function correctLetter(){
  if(kartMoving||crashing||postCrashWait)return;
  spawnConfetti(40);

  if(currentIndex<26){
    showToast(`✅ ${LETTERS[currentIndex-1||0]}! Great job! 🎉`,900);
  }

  currentIndex++;
  kartTargetT=cpT(Math.min(currentIndex,TOTAL_CP-1));
  kartMoving=true;
  updateHUD();

  if(currentIndex>=TOTAL_CP){
    setTimeout(triggerWin,1600);
  }
}

function wrongLetter(heard){
  if(crashing||postCrashWait)return;
  const expected=currentIndex<=25?LETTERS[currentIndex]:'FINISH';
  showToast(`❌ "${heard}" — Try again!<br>Say <b>${expected}</b>`,2200);
  // start donut
  crashing=true; crashTimer=0; donutAngle=0;
  donutCenter.copy(kartGroup.position);
}

function triggerWin(){
  gameWon=true;
  spawnConfetti(200);
  document.getElementById('win').classList.add('show');
}

function resetGame(){
  currentIndex=0; kartT=0; kartTargetT=0;
  kartMoving=false; crashing=false; crashTimer=0;
  postCrashWait=false; gameWon=false;
  confetti=[];
  document.getElementById('win').classList.remove('show');
  initKartPos();
  updateHUD();
  spawnConfetti(20);
}

// ═══════════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════════
let lastTS = 0;
const tmpVec3 = new THREE.Vector3();

function animate(ts) {
  requestAnimationFrame(animate);
  const dt = Math.min((ts-lastTS)/1000, 0.05);
  lastTS = ts;

  if (!gameStarted) { renderer.render(scene,camera); return; }

  // Billboard checkpoints to camera
  cpMeshes.forEach(m => m.quaternion.copy(camera.quaternion));

  // ── Crash donut ──
  if (crashing) {
    crashTimer += dt;
    donutAngle += dt * 6;
    const r = 3.5;
    kartGroup.position.x = donutCenter.x + Math.cos(donutAngle)*r;
    kartGroup.position.z = donutCenter.z + Math.sin(donutAngle)*r;
    kartGroup.rotation.y = -donutAngle + Math.PI/2;
    // bounce
    kartGroup.position.y = Math.abs(Math.sin(donutAngle*2))*0.4;

    if (crashTimer > 1.2 && crashTimer < 1.3) {
      triggerExplosion(donutCenter.clone());
    }
    if (crashTimer > 2.5) {
      crashing=false; postCrashWait=true;
      setTimeout(()=>{ postCrashWait=false; },200);
      // reset to current cp
      const p=cpPositions[currentIndex];
      kartGroup.position.copy(p); kartGroup.position.y=0;
      kartT=cpT(currentIndex);
    }
  }

  // ── Normal movement ──
  if (kartMoving && !crashing) {
    const targetPt = trackCurve.getPoint(kartTargetT);
    const dist = kartGroup.position.distanceTo(targetPt.setY ? targetPt : Object.assign(new THREE.Vector3(), targetPt));
    const tPt = new THREE.Vector3().copy(trackCurve.getPoint(kartTargetT));
    const dx = tPt.x - kartGroup.position.x;
    const dz = tPt.z - kartGroup.position.z;
    const d2 = Math.sqrt(dx*dx+dz*dz);

    if (d2 < 0.4) {
      kartGroup.position.x = tPt.x;
      kartGroup.position.z = tPt.z;
      kartT = kartTargetT;
      kartMoving = false;
      kartVelMag = 0;
    } else {
      const speed = Math.min(d2*2.5, 25);
      kartVelMag = speed;
      kartGroup.position.x += (dx/d2)*speed*dt;
      kartGroup.position.z += (dz/d2)*speed*dt;
      kartGroup.position.y = Math.sin(Date.now()*0.01)*0.04; // gentle float

      // Heading
      const targetYaw = Math.atan2(dx, dz);
      let dYaw = targetYaw - kartGroup.rotation.y;
      while(dYaw>Math.PI) dYaw-=2*Math.PI;
      while(dYaw<-Math.PI) dYaw+=2*Math.PI;
      kartGroup.rotation.y += dYaw * 0.12;

      // exhaust
      const backDir = new THREE.Vector3(Math.sin(kartGroup.rotation.y), 0, Math.cos(kartGroup.rotation.y));
      [-0.6,0.6].forEach(side=>{
        const ep=kartGroup.position.clone().addScaledVector(backDir,2.1);
        ep.x+=side*Math.cos(kartGroup.rotation.y)*0.5;
        ep.y+=0.5;
        spawnExhaust(ep, backDir.clone().negate());
      });
    }
    kartWobble += dt*14;
    // kids: fun roll on turns
    kartGroup.rotation.z = Math.sin(kartWobble)*0.03;
  }

  updateExhaust(dt);
  updateExplosion(dt);
  updateConfetti(dt);

  // ── Chase camera ──
  if (!crashing) {
    const behind = new THREE.Vector3(
      Math.sin(kartGroup.rotation.y) * -18,
      14,
      Math.cos(kartGroup.rotation.y) * -18
    );
    const targetCamPos = kartGroup.position.clone().add(behind);
    camera.position.lerp(targetCamPos, 0.06);
    const lookAt = kartGroup.position.clone().add(new THREE.Vector3(
      Math.sin(kartGroup.rotation.y)*8, 0, Math.cos(kartGroup.rotation.y)*8
    ));
    camera.lookAt(lookAt);
  }

  renderer.render(scene, camera);
}
requestAnimationFrame(animate);

// ═══════════════════════════════════════════════════════
//  SPEECH RECOGNITION
// ═══════════════════════════════════════════════════════
const LETTER_ALIASES = {
  'A':['A','AY','AH','APPLE','ACE','AIR'],
  'B':['B','BE','BEE','BALL','BOY'],
  'C':['C','SEE','SEA','CAT','CUE'],
  'D':['D','DEE','DOG','DAD'],
  'E':['E','EE','EGG','EAT'],
  'F':['F','EF','FISH','FUN'],
  'G':['G','GEE','JEE','GO','GOAT'],
  'H':['H','AITCH','HAY','HEN'],
  'I':['I','EYE','ICE','IN'],
  'J':['J','JAY','JAM','JOY'],
  'K':['K','KAY','KEY','KING'],
  'L':['L','EL','ELL','LION','LEG'],
  'M':['M','EM','MAN','MOM'],
  'N':['N','EN','NUT','NOW'],
  'O':['O','OH','OWE','OWL'],
  'P':['P','PEE','PIG','PAN'],
  'Q':['Q','CUE','QUEEN','QUIZ'],
  'R':['R','ARE','RAT','RUN'],
  'S':['S','ESS','SUN','SAP'],
  'T':['T','TEE','TEN','TOP'],
  'U':['U','YOU','UP','USE'],
  'V':['V','VEE','VAN','VET'],
  'W':['W','DOUBLE','WEB','WIN'],
  'X':['X','EX','ECKS','FOX','BOX'],
  'Y':['Y','WHY','YAK','YES'],
  'Z':['Z','ZEE','ZED','ZIP','ZAP','ZOO']
};

function processVoice(text) {
  if (gameWon || crashing || postCrashWait) return false;
  text = text.trim().toUpperCase();
  const words = text.split(/\s+/);

  const needFinish = currentIndex >= 26;
  if (needFinish) {
    if (text.includes('FINISH') || text.includes('FINISHED')) {
      correctLetter(); return true;
    }
    wrongLetter(text.slice(0,10)); return false;
  }

  const needLetter = LETTERS[currentIndex];
  const aliases = LETTER_ALIASES[needLetter] || [needLetter];
  for (const word of words) {
    if (aliases.includes(word) || word[0]===needLetter) {
      correctLetter(); return true;
    }
  }
  wrongLetter(text.slice(0,10)); return false;
}

let recognition=null, isListening=false;
function setupSpeech(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){document.getElementById('noSpeechWarn').style.display='block';return;}
  recognition=new SR();
  recognition.continuous=false; recognition.interimResults=false;
  recognition.lang='en-US'; recognition.maxAlternatives=5;
  recognition.onresult=(ev)=>{
    const res=ev.results[0];
    showHeard(res[0].transcript.trim());
    let matched=false;
    for(let i=0;i<res.length;i++){
      if(processVoice(res[i].transcript)){matched=true;break;}
    }
    if(!matched) processVoice(res[0].transcript);
    stopListening();
  };
  recognition.onerror=()=>stopListening();
  recognition.onend=()=>stopListening();
}
function startListening(){
  if(!recognition||isListening||!gameStarted||gameWon||crashing)return;
  isListening=true;
  document.getElementById('micBtn').classList.add('on');
  document.getElementById('micHint').textContent='Listening... 🎤';
  try{recognition.start();}catch(e){stopListening();}
}
function stopListening(){
  isListening=false;
  document.getElementById('micBtn').classList.remove('on');
  document.getElementById('micHint').textContent='Hold to Speak!';
  try{recognition.stop();}catch(e){}
}

const mic=document.getElementById('micBtn');
mic.addEventListener('mousedown',startListening);
mic.addEventListener('touchstart',e=>{e.preventDefault();startListening();},{passive:false});
mic.addEventListener('mouseup',stopListening);
mic.addEventListener('touchend',e=>{e.preventDefault();stopListening();},{passive:false});
mic.addEventListener('mouseleave',stopListening);

// ─── Keyboard fallback ───────────────────────────────
let keyMode=false;
document.getElementById('keyHint').addEventListener('click',()=>{
  keyMode=!keyMode;
  document.getElementById('keyHint').textContent=keyMode?'✅ Keyboard mode ON':'⌨️ Enable keyboard mode (testing)';
